<!DOCTYPE html>
<html lang="en">
<head>
    <title>Stuypedia</title>
    <!-- Foundation CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/css/foundation.min.css">
    <!-- Foundation Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundicons/3.0.0/foundation-icons.min.css">
    <!-- Your custom CSS -->
	<link href="../static/css/home.css" rel="stylesheet"/>
    <link href="../static/css/addclass.css" rel="stylesheet"/>
</head>
<body>
	
<nav class="top-nav">
    <div class="top-nav-logo">
        <img src="../static/images/stuypedia_logo.png" class="logo">
    </div>
    <div class="top-nav-links">
        <a href="/home">HOME</a>
        <a href="/calendar">CALENDAR</a>
        <a href="/modify">MODIFY CLASSES</a>
        <a href="/findclass">FIND A CLASS</a>
    </div>
    <div class="top-nav-right">
        <div class="profile-dropdown">
            <div class="profile-icon" id="profileBtn">
                <i class="fi-torso"></i>
            </div>

            <div class="profile-menu" id="profileMenu">
                <a href="/profile">MY PROFILE</a>
                <a href="/logout">LOGOUT</a>
            </div>
        </div>
    </div>
</nav>
<div class = "main">
<div class="float-nav" id="floatNav">
    <div class="float-nav-toggle" id="floatNavToggle">
        <i class="fi-list"></i>
    </div>
    <div class="float-nav-menu" id="floatNavMenu">
        <a href="/home" title="Home"><i class="fi-home"></i></a>
        <a href="/calendar" title="Calendar"><i class="fi-calendar"></i></a>
        <a href="/modify" title="Modify Classes"><i class="fi-pencil"></i></a>
        <a href="/findclass" title="Find a Class"><i class="fi-magnifying-glass"></i></a>
        <a href="/logout" title="Log out"><i class="fi-power"></i></a>
    </div>
</div>

<div class="grid-container">
  <div class="grid-x grid-margin-x">
    <div class="cell">
      <h1>Add a class</h1>
      
      <p>Before doing this, make sure your class doesn't already exist!</p>

      <div class="form-box">
        <form method="POST">
          <label for="name">Enter the name of the class:</label>
          <input type="text" name="name" placeholder="Class name" required>
          
          <label for="subject">What subject is this class?</label>
          <select name="subject" id="subject" required>
            <option value="English">English</option>
            <option value="Languages">Languages</option>
            <option value="Social Studies">Social Studies/History</option>
            <option value="Math">Math</option>
            <option value="Science">Science</option>
            <option value="Tech">Tech</option>
            <option value="Art">Art</option>
            <option value="Other">Other</option>
          </select>
          
          <p>Which grades can take this class?</p>
          <div class="checkbox-group">
            <input type="checkbox" id="nine" name="grade" value="nine">
            <label for="nine">9</label>
            
            <input type="checkbox" id="ten" name="grade" value="ten">
            <label for="ten">10</label>
            
            <input type="checkbox" id="eleven" name="grade" value="eleven">
            <label for="eleven">11</label>
            
            <input type="checkbox" id="twelve" name="grade" value="twelve">
            <label for="twelve">12</label>
          </div>

          <label for="teachers">List out the teachers that teach this class. Separate each last name by commas.</label>
          <input type="text" name="teachers" placeholder="List teachers..." required>
          
          <button type="submit">Submit</button>
        </form>
      </div>
    </div>
  </div>
</div>
</div>
	
</body>
</html>
