<!DOCTYPE html>
<html lang="en">
<head>
    <title>Stuypedia - Find a Class</title>
    <!-- Foundation Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundicons/3.0.0/foundation-icons.min.css">
    
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <link href="../static/css/home.css" rel="stylesheet"/>
    <link href="../static/css/findclass.css" rel="stylesheet"/>
</head>
<body>

<nav class="top-nav">
    <div class="top-nav-logo">
        <img src="../static/images/stuypedia_logo.png" class="logo">
    </div>
    <div class="top-nav-links">
        <a href="/home">HOME</a>
        <a href="/calendar">CALENDAR</a>
        <a href="/modify">MODIFY CLASSES</a>
        <a href="/findclass">FIND A CLASS</a>
    </div>
    <div class="top-nav-right">
        <div class="profile-dropdown">
            <div class="profile-icon" id="profileBtn">
                <i class="fi-torso"></i>
            </div>

            <div class="profile-menu" id="profileMenu">
                <a href="/profile">MY PROFILE</a>
                <a href="/logout">LOGOUT</a>
            </div>
        </div>
    </div>
</nav>

<div class="float-nav" id="floatNav">
    <div class="float-nav-toggle" id="floatNavToggle">
        <i class="fi-list"></i>
    </div>
    <div class="float-nav-menu" id="floatNavMenu">
        <a href="/home" title="Home"><i class="fi-home"></i></a>
        <a href="/calendar" title="Calendar"><i class="fi-calendar"></i></a>
        <a href="/modify" title="Modify Classes"><i class="fi-pencil"></i></a>
        <a href="/findclass" title="Find a Class"><i class="fi-magnifying-glass"></i></a>
        <a href="/logout" title="Log out"><i class="fi-power"></i></a>
    </div>
</div>

<div class="main-box">
    <div class="page-title">
        <h1>FIND A CLASS</h1>
        <p class="divider-text">·•—–٠✤٠—–•·</p>
    </div>

    <div class="search-section">
        <div class="search-box">
            <form method="POST">
                <div class="search-wrapper">
                    <input type="text" name="search" placeholder="Search for a class...">
                    
                    <div class="filter-group">
                        <label for="subject">Subject:</label>
                        <select name="subject">
                            <option value="None">All</option>
                            <option value="English">English</option>
                            <option value="Languages">Languages</option>
                            <option value="Social Studies">Social Studies/History</option>
                            <option value="Math">Math</option>
                            <option value="Science">Science</option>
                            <option value="Tech">Tech</option>
                            <option value="Art">Art</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="grade">Grade:</label>
                        <select name="grade">
                            <option value="None">All</option>
                            <option value="nine">9</option>
                            <option value="ten">10</option>
                            <option value="eleven">11</option>
                            <option value="twelve">12</option>
                        </select>
                    </div>

                    <button type="submit">Search</button>
                </div>
            </form>
        </div>

        {% if searched %}
            <div class="results-section">
                <h2>Search Results</h2>
                <table>
                    {% for s in searched %}
                        <tr>
                            <td><a href='/classpage/{{ s[0] }}' class="class-link">{{ s[1] }}</a></td>
                            <td><button type="button" class="save-btn" onclick="addClass({{ s[0] }})">Save Class</button></td>
                        </tr>
                    {% endfor %}
                </table>
            </div>
        {% endif %}

        <p class="suggest-link">Can't find a class? Click <a href='/addclass'>here</a> to suggest one.</p>
    </div>
</div>

<script src='../static/js/findclass.js'></script>
<script>
document.getElementById('floatNavToggle').addEventListener('click', () => {
    document.getElementById('floatNav').classList.toggle('expanded');
});

const profileBtn = document.getElementById("profileBtn");
const profileMenu = document.getElementById("profileMenu");

profileBtn.addEventListener("click", () => {
    profileMenu.classList.toggle("show");
});

document.addEventListener("click", (profile) => {
    if (!profileBtn.contains(profile.target) &&
        !profileMenu.contains(profile.target)) {
        profileMenu.classList.remove("show");
    }
});
</script>

</body>
</html>
