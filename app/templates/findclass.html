<!DOCTYPE html>
<html lang="en">
<head>
    <title>Stuypedia</title>
    <!-- Foundation CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/css/foundation.min.css">
    <!-- Foundation Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundicons/3.0.0/foundation-icons.min.css">
    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- Foundation JS -->
    <script src="https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/js/foundation.min.js"></script>
	
	<link href="../static/css/home.css" rel="stylesheet"/>
    <link href="../static/css/findclass.css" rel="stylesheet"/>
	
</head>
<body>

<nav class="top-nav">
    <div class="top-nav-logo">
        <img src="../static/images/stuypedia_logo.png" class="logo">
    </div>
    <div class="top-nav-links">
        <a href="/home">HOME</a>
        <a href="/calendar">CALENDAR</a>
        <a href="/modify">MODIFY CLASSES</a>
        <a href="/findclass">FIND A CLASS</a>
    </div>
    <div class="top-nav-right">
        <div class="profile-dropdown">
            <div class="profile-icon" id="profileBtn">
                <i class="fi-torso"></i>
            </div>

            <div class="profile-menu" id="profileMenu">
                <a href="/profile">MY PROFILE</a>
                <a href="/logout">LOGOUT</a>
            </div>
        </div>
    </div>
</nav>

<div class="float-nav" id="floatNav">
    <div class="float-nav-toggle" id="floatNavToggle">
        <i class="fi-list"></i>
    </div>
    <div class="float-nav-menu" id="floatNavMenu">
        <a href="/home" title="Home"><i class="fi-home"></i></a>
        <a href="/calendar" title="Calendar"><i class="fi-calendar"></i></a>
        <a href="/modify" title="Modify Classes"><i class="fi-pencil"></i></a>
        <a href="/findclass" title="Find a Class"><i class="fi-magnifying-glass"></i></a>
        <a href="/logout" title="Log out"><i class="fi-power"></i></a>
    </div>
</div>

<div class = "main">
	<div class="grid-container">
	  <div class="grid-x grid-margin-x">
	    <div class="cell">
	      <h1>Find a class:</h1>
	      
	      <div class="search-box">
	        <form method="POST">
	          <div class="search-wrapper">
	            <input style="width: 300px;"type="text" name="search" placeholder="Search for a class...">
	            <label for="subject">Subject:</label>
	            <select name="subject">
	              <option name="all" value="None"> all </option>
	              <option name="English"> English </option>
	              <option name="Languages"> Languages </option>
	              <option name="Social Studies"> Social Studies/History </option>
	              <option name="Math"> Math </option>
	              <option name="Science"> Science </option>
	              <option name="Tech"> Tech </option>
	              <option name="Art"> Art </option>
	              <option name="Other"> Other </option>
	            </select>
	
	            <label for="grade">Grade:</label>
	            <select name="grade">
	              <option name="all" value="None"> all </option>
	              <option name="nine" value="nine"> 9 </option>
	              <option name="ten" value="ten"> 10 </option>
	              <option name="eleven" value="eleven"> 11 </option>
	              <option name="twelve" value="twelve"> 12 </option> 
	            </select>
	
	            <button type="submit">Search</button>
	          </div>
	        </form>
	      </div>
	
	      {% if searched %}
	        <table>
	          {% for s in searched %}
	            <tr>
	              <td><a href='/classpage/{{ s[0] }}'>{{ s[1] }}</a></td>
	              <td><button type="button" onclick="addClass({{ s[0] }})">Save class</button></td>
	            </tr>
	          {% endfor %}
	        </table>
	      {% endif %}
	
	      <p class="suggest-link">Can't find a class? Click <a href='/addclass'>here</a> to suggest one.</p>
	    </div>
	  </div>
	</div>


</div>
<script src='../static/js/findclass.js'></script>
<script>
document.getElementById('floatNavToggle').addEventListener('click', () => {
    document.getElementById('floatNav').classList.toggle('expanded');
});

const profileBtn = document.getElementById("profileBtn");
const profileMenu = document.getElementById("profileMenu");

profileBtn.addEventListener("click", () => {
    profileMenu.classList.toggle("show");
});

document.addEventListener("click", (profile) => {
    if (!profileBtn.contains(profile.target) &&
        !profileMenu.contains(profile.target)) {
        profileMenu.classList.remove("show");
    }
});
</script>
	
</body>
</html>
