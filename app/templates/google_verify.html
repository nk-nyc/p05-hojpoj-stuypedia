<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Verify - Stuypedia</title>
        <link href="../static/css/register.css" rel="stylesheet"/>
    </head>
    <body>
        <form method="post" action="/google-verify">
            <div class="register-box">
                <div class="authentification">
                    <h2 class="title">AUTHENTICATION</h2>
                    <p>Almost there! Verify you're a Stuyvesant student.</p>

                    {% if error %}
                    <p class="error-msg">{{ error }}</p>
                    {% endif %}

                    <div class="question-row">
                        <span>WHAT FLOOR IS THE CAFETERIA ON?</span>
                        <select name="q1" id="q1">
                            <option value="one">One</option>
                            <option value="two">Two</option>
                            <option value="three">Three</option>
                            <option value="four">Four</option>
                            <option value="five">Five</option>
                            <option value="six">Six</option>
                        </select>
                    </div>

                    <div class="question-row">
                        <span>WHAT FLOOR IS THE LIBRARY ON?</span>
                        <select name="q2" id="q2">
                            <option value="one">One</option>
                            <option value="two">Two</option>
                            <option value="three">Three</option>
                            <option value="four">Four</option>
                            <option value="five">Five</option>
                            <option value="six">Six</option>
                        </select>
                    </div>

                    <div class="question-row">
                        <span>WHAT FLOOR IS THE JUNIOR ATRIUM ON?</span>
                        <select name="q3" id="q3">
                            <option value="one">One</option>
                            <option value="two">Two</option>
                            <option value="three">Three</option>
                            <option value="four">Four</option>
                            <option value="five">Five</option>
                            <option value="six">Six</option>
                        </select>
                    </div>

                    <div class="question-row">
                        <span>WHAT FLOOR IS THE SOPHOMORE BAR ON?</span>
                        <select name="q4" id="q4">
                            <option value="one">One</option>
                            <option value="two">Two</option>
                            <option value="three">Three</option>
                            <option value="four">Four</option>
                            <option value="five">Five</option>
                            <option value="six">Six</option>
                        </select>
                    </div>

                    <label class="checkbox-label">
                        <input type="checkbox" name="testimony" required>
                        <span>I TESTIFY THAT I AM A STUYVESANT STUDENT.</span>
                    </label>

                    <input type="submit" value="VERIFY" class="submit-btn">
                </div>
            </div>
        </form>
    </body>
</html>
