<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Stuypedia</title>
        <link href="../static/css/home.css" rel="stylesheet"/>
    </head>
    <body>
        <h1>Stuypedia</h1>
        <p>Welcome to Stuypedia!</p>

        <div id="calendar">

        </div>

        <div id="upcoming">
<!-- upcoming tasks/events/tests will go here -->
        </div>

        <div id="classlist">
          <h3> Your Classes </h3>

            {% for class in classes %}

          </ul>

          <p> <a href='/modify'> Modify Classes </a> </p>
          <!-- will be a link to allow them to select classes -->
        </div>


    </body>
    <p> <a href='/logout'> log out </a> </p>
</html>
