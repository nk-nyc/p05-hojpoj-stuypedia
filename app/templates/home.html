<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Stuypedia</title>
        <link href="../static/css/home.css" rel="stylesheet"/>
    </head>
    <body>
      <nav id="navbar">
        <ul id="navbar">
        <li> <a href='/home'> Home </a> </li>
        <li> <a href='/calendar'> Calendar </a> </li>
        <li> <a href='/modify'> Modify Classes </a> </li>
        <li> <a href='/findclass'> Find a class </a> </li>
        <li> <a href='/logout'> Log out </a> </li>
        </ul>
      </nav>
        <h1>Stuypedia</h1>
        <p>Welcome to Stuypedia!</p>
        
        <div id="upcoming-events">
        <h2>Upcoming Events</h2>
        {% if upcoming %}
          <ul>
            {% for event in upcoming %}
              <li>
                <span class="event-date">{{ event.start }}</span>
                <span class="event-title" style="color: {{ event.color }}">{{ event.title }}</span>
              </li>
            {% endfor %}
          </ul>
        {% else %}
          <p>No upcoming events. <a href="/calendar">Add one →</a></p>
        {% endif %}
      </div>
    </body>
</html>
