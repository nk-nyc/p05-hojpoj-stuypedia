<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Log in</title>
        <link href="../static/css/login.css" rel="stylesheet"/>
    <style>
       form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: #e6a6fc;
        }

        input[type="text"],
        input[type="password"] {
                  width: 100%;
                  padding: 12px 15px;
                  border: 2px solid #86c1d6;
                  border-radius: 10px;
                  font-size: 16px;
			      box-sizing: border-box;
                    
        }

        input[type="submit"] {
            background-color: #135596;
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 13px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #01186d;
        }
    </style>

    </head>
    <body style = "  
    padding: 20px;
    min-height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Helvetica
    ">

    <div style="
      max-width: 500px;
      width: 100%;
      padding: 50px;
      border-radius: 15px;
      box-shadow: 0 10px 25px #86c1d6;
      border: 2px solid #86c1d6;
      text-align: center;
    ">
        <h1> LOG IN </h1>
        <p>   </p>
        <p>{{error}}</p>
        <form method="post" action="/login">

          <!-- <label for="username">Username:</label> -->

            <input type="text" id="username" name="username" placeholder= "Username" required>
            <br>
          <!--  <label for="password">Password:</label> -->

            <input type="password" id="password" name="password"  placeholder= "Password" required>
            <br>
            <input type="submit" value="LOGIN">
        </form>

            <p> Don't have an account? <a href="/register" style="color: #333; text-decoration: underline;"> Sign up</a></p>


    </body>
</html>
